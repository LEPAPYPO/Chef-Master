<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chef Master | Cloud Network</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root { 
            --primary: #ff6b6b; --dark: #1a1c20; --bg: #f8f9fb; 
            --card: #ffffff; --text: #2d3436; --shadow: 0 15px 35px rgba(0,0,0,0.06); 
            --sidebar: #ffffff;
        }

        body.dark-mode { 
            --bg: #0f1012; --card: #1a1c20; --text: #f8f9fb; 
            --shadow: 0 10px 30px rgba(0,0,0,0.5); --sidebar: #151619;
        }

        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: var(--sidebar); padding: 40px 24px; display: flex; flex-direction: column; border-right: 1px solid #eee; z-index: 100; }
        .logo { font-size: 1.8rem; font-weight: 800; cursor: pointer; margin-bottom: 40px; }
        .logo span { color: var(--primary); }
        .menu-btn { padding: 15px; cursor: pointer; border-radius: 15px; border: none; background: none; color: #718096; text-align: left; font-weight: 600; display: flex; align-items: center; gap: 12px; width: 100%; margin-bottom: 5px; font-size: 1rem; }
        .menu-btn.active { background: var(--primary); color: white; }

        /* MAIN AREA */
        .main { flex: 1; overflow-y: auto; padding: 40px; scroll-behavior: smooth; }
        .hidden { display: none !important; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .card { background: var(--card); border-radius: 25px; overflow: hidden; box-shadow: var(--shadow); cursor: pointer; position: relative; }
        .img-container { width: 100%; height: 200px; position: relative; background: #eee; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .fav-btn { position: absolute; top: 15px; right: 15px; background: white; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1); z-index: 10; font-size: 1.2rem; }

        /* DETAILS */
        .recipe-hero { width: 100%; height: 400px; border-radius: 35px; object-fit: cover; margin-bottom: 30px; }
        .layout { display: grid; grid-template-columns: 1fr 350px; gap: 40px; }
        .ing-card { background: var(--card); padding: 30px; border-radius: 25px; box-shadow: var(--shadow); height: fit-content; }
        .portion-ctrl { display: flex; align-items: center; justify-content: space-between; background: var(--dark); color: white; padding: 15px; border-radius: 18px; margin-bottom: 20px; }
        .p-btn { width: 30px; height: 30px; border-radius: 8px; border: none; background: #444; color: white; cursor: pointer; font-weight: bold; }

        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 15px; border: 1px solid #eee; background: var(--card); color: var(--text); outline: none; font-family: inherit; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: 700; cursor: pointer; }
        .btn-danger { background: #ff4757; color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 20px; }

        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar { position: fixed; bottom: 0; width: 100%; height: 75px; flex-direction: row; padding: 10px; border-top: 1px solid #eee; border-radius: 25px 25px 0 0; }
            .logo, .menu-btn span, #admin-nav-group, #logout-btn, #theme-text { display: none; }
            .main { padding: 20px 20px 95px 20px; }
            .layout { grid-template-columns: 1fr; }
            .menu-btn { justify-content: center; flex: 1; margin: 0; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo" onclick="showPage('home')">Chef<span>Master.</span></div>
    
    <button class="menu-btn active" id="nav-home" onclick="showPage('home')">🏠 <span>Recettes</span></button>
    <button class="menu-btn" id="nav-favs" onclick="showPage('favs')">❤️ <span>Favoris</span></button>
    
    <div id="admin-nav-group" class="hidden">
        <hr style="border:0; border-top:1px solid #eee; margin: 10px 0">
        <button class="menu-btn" id="nav-add" onclick="showPage('add')">✨ <span>Créer</span></button>
        <button class="menu-btn" id="nav-admin" onclick="showPage('admin')">👥 <span>Membres</span></button>
    </div>

    <div style="margin-top: auto; display: flex; flex-direction: column; gap: 5px;">
        <button class="menu-btn" onclick="toggleTheme()">🌓 <span id="theme-text">Sombre</span></button>
        <button id="login-trigger" class="menu-btn" onclick="openLogin()">🔑 <span>Login</span></button>
        <button id="logout-btn" class="menu-btn hidden" style="color: var(--primary)" onclick="logout()">🚪 <span>Quitter</span></button>
    </div>
</div>

<div class="main">
    <div id="page-home">
        <h1>Découvrir 🌍</h1>
        <input type="text" id="search" placeholder="Rechercher sur le Cloud..." oninput="renderHome()">
        <div id="home-grid" class="grid"></div>
    </div>

    <div id="page-favs" class="hidden">
        <h1>Mes Favoris ❤️</h1>
        <div id="favs-grid" class="grid"></div>
    </div>

    <div id="page-detail" class="hidden">
        <button class="btn-primary" style="width:auto; margin-bottom:20px" onclick="showPage('home')">← Retour</button>
        <div id="detail-content"></div>
    </div>

    <div id="page-add" class="hidden">
        <h1>Publier pour TOUS ✨</h1>
        <input type="text" id="r-title" placeholder="Nom du plat">
        <input type="text" id="r-time" placeholder="Temps (ex: 25 min)">
        <input type="text" id="r-img" placeholder="Lien image URL">
        <textarea id="r-ing" placeholder="Ingrédients (ex: 500g Pâtes, 2 Tomates) séparés par virgule"></textarea>
        <textarea id="r-steps" rows="6" placeholder="Instructions..."></textarea>
        <button class="btn-primary" onclick="saveRecipe()">Mettre en ligne</button>
    </div>

    <div id="page-admin" class="hidden">
        <h1>Gestion des Membres 👥</h1>
        <div style="background:var(--card); padding:25px; border-radius:25px; margin-bottom:20px; box-shadow: var(--shadow);">
            <h3>Créer un nouveau compte Cloud</h3>
            <input type="text" id="new-u" placeholder="Pseudo">
            <input type="password" id="new-p" placeholder="Mot de passe">
            <select id="new-role">
                <option value="viewer">Viewer (Lecture seule)</option>
                <option value="admin">Admin (Accès total)</option>
            </select>
            <button class="btn-primary" onclick="createUser()">Créer le compte</button>
        </div>
        <div id="user-list-cloud"></div>
    </div>
</div>

<div id="modal-login" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(5px); display:flex; align-items:center; justify-content:center; z-index:1000;">
    <div style="background:var(--card); padding:35px; border-radius:30px; width:90%; max-width:400px; text-align:center;">
        <h2>Connexion Cloud</h2>
        <input type="text" id="login-u" placeholder="Utilisateur">
        <input type="password" id="login-p" placeholder="Mot de passe">
        <button class="btn-primary" onclick="login()">Se connecter</button>
        <button onclick="closeLogin()" style="background:none; border:none; color:#aaa; margin-top:15px; cursor:pointer">Annuler</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- TA CONFIGURATION FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyBfJCBY4ieTmJOpDWolkW76pi1xitm9gx4",
        authDomain: "chefmaster-dc754.firebaseapp.com",
        projectId: "chefmaster-dc754",
        storageBucket: "chefmaster-dc754.firebasestorage.app",
        messagingSenderId: "726904960382",
        appId: "1:123456789:web:12ee663d19a50f53afef2f" // J'ai repris tes infos
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const recipesCol = collection(db, "recipes");
    const usersCol = collection(db, "users");

    // --- VARIABLES D'ÉTAT ---
    let recipes = [];
    let cloudUsers = [];
    let currentUser = null;
    let currentPortions = 4;
    let localFavs = JSON.parse(localStorage.getItem('cm_favs_cloud')) || [];

    // --- SYNCHRONISATION TEMPS RÉEL ---
    onSnapshot(recipesCol, (snap) => {
        recipes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        window.renderHome();
    });

    onSnapshot(usersCol, (snap) => {
        cloudUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        window.renderUsers();
    });

    // --- NAVIGATION ---
    window.showPage = (p) => {
        document.querySelectorAll('.main > div').forEach(d => d.classList.add('hidden'));
        document.getElementById('page-'+p).classList.remove('hidden');
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        if(document.getElementById('nav-'+p)) document.getElementById('nav-'+p).classList.add('active');
        if(p === 'favs') window.renderFavs();
    };

    // --- AFFICHAGE RECETTES ---
    window.renderHome = () => {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = recipes.filter(r => r.title.toLowerCase().includes(q));
        const grid = document.getElementById('home-grid');
        grid.innerHTML = filtered.map(r => `
            <div class="card" onclick="window.openRecipe('${r.id}')">
                <div class="img-container">
                    <img src="${r.img}" class="card-img">
                    <button class="fav-btn" onclick="event.stopPropagation(); window.toggleFav('${r.id}')">
                        ${localFavs.includes(r.id) ? '❤️' : '🤍'}
                    </button>
                </div>
                <div style="padding:20px"><b>${r.title}</b><br><small>⏱ ${r.time}</small></div>
            </div>`).join('');
    };

    window.renderFavs = () => {
        const filtered = recipes.filter(r => localFavs.includes(r.id));
        const grid = document.getElementById('favs-grid');
        grid.innerHTML = filtered.length ? filtered.map(r => `
            <div class="card" onclick="window.openRecipe('${r.id}')">
                <div class="img-container"><img src="${r.img}" class="card-img"></div>
                <div style="padding:20px"><b>${r.title}</b></div>
            </div>`).join('') : "<p style='grid-column:1/-1; text-align:center;'>Aucun favori.</p>";
    };

    // --- DETAIL & PORTIONS ---
    window.openRecipe = (id) => {
        const r = recipes.find(x => x.id === id);
        currentPortions = 4;
        window.showPage('detail');
        window.renderDetail(r);
    };

    window.renderDetail = (r) => {
        const ratio = currentPortions / 4;
        const ings = r.ing.map(i => i.replace(/(\d+)/g, m => Math.round(m * ratio)));
        const isAdmin = currentUser && currentUser.role === 'admin';
        
        document.getElementById('detail-content').innerHTML = `
            <img src="${r.img}" class="recipe-hero">
            <div class="layout">
                <div>
                    <h1>${r.title}</h1>
                    <p style="white-space:pre-line; line-height:1.8">${r.steps}</p>
                    ${isAdmin ? `<button class="btn-danger" onclick="window.deleteRecipe('${r.id}')">Supprimer pour TOUS 🗑️</button>` : ''}
                </div>
                <div class="ing-card">
                    <div class="portion-ctrl">
                        <span>Personnes</span>
                        <div>
                            <button class="p-btn" onclick="window.changeP(-1, '${r.id}')">-</button>
                            <b style="margin:0 10px">${currentPortions}</b>
                            <button class="p-btn" onclick="window.changeP(1, '${r.id}')">+</button>
                        </div>
                    </div>
                    <h3>Ingrédients</h3>
                    <ul style="padding:0; list-style:none">
                        ${ings.map(i => `<li style="padding:10px 0; border-bottom:1px solid #eee">✔ ${i}</li>`).join('')}
                    </ul>
                </div>
            </div>`;
    };

    window.changeP = (v, id) => {
        if(currentPortions + v >= 1) {
            currentPortions += v;
            window.renderDetail(recipes.find(x => x.id === id));
        }
    };

    // --- ACTIONS CLOUD ---
    window.saveRecipe = async () => {
        const title = document.getElementById('r-title').value;
        if(!title) return alert("Titre obligatoire");
        await addDoc(recipesCol, {
            title,
            time: document.getElementById('r-time').value,
            img: document.getElementById('r-img').value || "https://images.unsplash.com/photo-1495521821757-a1efb6729352?w=500",
            ing: document.getElementById('r-ing').value.split(','),
            steps: document.getElementById('r-steps').value,
            date: Date.now()
        });
        window.showPage('home');
    };

    window.deleteRecipe = async (id) => {
        if(confirm("Supprimer définitivement ?")) {
            await deleteDoc(doc(db, "recipes", id));
            window.showPage('home');
        }
    };

    // --- GESTION UTILISATEURS ---
    window.createUser = async () => {
        const u = document.getElementById('new-u').value;
        const p = document.getElementById('new-p').value;
        const role = document.getElementById('new-role').value;
        if(u && p) {
            await addDoc(usersCol, { u, p, role });
            alert("Compte Cloud créé !");
            document.getElementById('new-u').value = "";
            document.getElementById('new-p').value = "";
        }
    };

    window.renderUsers = () => {
        const list = document.getElementById('user-list-cloud');
        if(!list) return;
        list.innerHTML = cloudUsers.map(user => `
            <div style="padding:15px; background:var(--card); margin-bottom:10px; border-radius:15px; display:flex; justify-content:space-between; align-items:center; border:1px solid #eee">
                <span><b>${user.u}</b> (${user.role})</span>
                ${user.u !== 'leandre' ? `<button onclick="window.deleteUser('${user.id}')" style="border:none; background:none; cursor:pointer">❌</button>` : ''}
            </div>
        `).join('');
    };

    window.deleteUser = async (id) => {
        if(confirm("Supprimer ce membre ?")) await deleteDoc(doc(db, "users", id));
    };

    // --- AUTHENTIFICATION ---
    window.login = () => {
        const u = document.getElementById('login-u').value;
        const p = document.getElementById('login-p').value;
        
        // On cherche dans les utilisateurs chargés du Cloud
        const found = cloudUsers.find(user => user.u === u && user.p === p);
        
        if(found) {
            currentUser = found;
            if(found.role === 'admin') document.getElementById('admin-nav-group').classList.remove('hidden');
            document.getElementById('login-trigger').classList.add('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            window.closeLogin();
        } else {
            alert("Identifiants incorrects");
        }
    };

    window.logout = () => location.reload();
    window.openLogin = () => document.getElementById('modal-login').classList.remove('hidden');
    window.closeLogin = () => document.getElementById('modal-login').classList.add('hidden');

    // --- THEME & FAVS ---
    window.toggleFav = (id) => {
        if(localFavs.includes(id)) localFavs = localFavs.filter(x => x !== id);
        else localFavs.push(id);
        localStorage.setItem('cm_favs_cloud', JSON.stringify(localFavs));
        window.renderHome();
    };

    window.toggleTheme = () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        document.getElementById('theme-text').innerText = isDark ? "Clair" : "Sombre";
    };

    // INIT
    window.renderHome();
</script>
</body>
</html>
